apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecom
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/akash66sheoran/ecom-gitops
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ecom

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true