{{- if and .Values.platformIngress.enabled .Values.platformIngress.kibana.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-kibana-ingress
  namespace: {{ .Values.platformIngress.kibana.namespace }}
  annotations:
    {{- range $key, $value := .Values.appIngress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    argocd.argoproj.io/sync-wave: "4"
spec:
  ingressClassName: {{ .Values.appIngress.className }}
  rules:
    - host: {{ .Values.platformIngress.kibana.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.platformIngress.kibana.serviceName }}
                port:
                  number: {{ .Values.platformIngress.kibana.servicePort }}
{{- end }}