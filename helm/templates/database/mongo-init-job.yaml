apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-mongo-init
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync

spec:
  template:
    spec:
      restartPolicy: OnFailure

      containers:
        - name: mongo-init
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"

          command:
            - bash
            - -c
            - |
              echo "⏳ Waiting for MongoDB..."
              until mongo --host mongo-0.mongo --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                sleep 5
              done

              echo "🔍 Checking replica set..."
              RS_STATUS=$(mongo --quiet --host mongo-0.mongo --eval "rs.status().ok" || echo 0)

              if [ "$RS_STATUS" = "1" ]; then
                echo "✅ Already initialized"
              else
                echo "⚡ Initializing replica set..."
                mongo --host mongo-0.mongo --eval "
                  rs.initiate({
                    _id: '{{ .Values.database.replicaSetName }}',
                    members: [
                      { _id: 0, host: 'mongo-0.mongo:27017' },
                      { _id: 1, host: 'mongo-1.mongo:27017' },
                      { _id: 2, host: 'mongo-2.mongo:27017' }
                    ]
                  })
                "
              fi

              echo "✅ Replica set ready"