apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    app.kubernetes.io/part-of: ecom

spec:
  provider: aws

  parameters:
    objects: |
      - objectName: "{{ .Values.secrets.mongoSecretName }}"
        objectType: "secretsmanager"